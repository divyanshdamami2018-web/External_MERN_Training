<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="signupstyle.css">

</head>
<body>
     <div class="container">

        <div class="sideimg">
            <img src="https://loremflickr.com/300/200"  alt="">
        </div>

        <div class="signup">
    <form action="" >
    <h3>Create an Account</h3>
    <h5>Already have an account? <a href="login.html">Log in</a></h5>
    
   <div class="input-container">

   <div class="name">
    <input type="text" placeholder="First name">
    <input type="text" placeholder="Last name">
   </div>
    <br>

    <div class="details">
    <input type="email" placeholder="Email">
    <br><br>
    <input type="password" placeholder="Enter your password">
    </div>

    <br>
    <div style="display:flex;justify-content:left;">
    <input type="checkbox" name="checkbox" id="checkbox">
    <label for="checkbox" style="font-size:15px;">I agree to the <a href="terms.html">Terms & Conditions</a></label>
   </div>
    <br>
   
    <button type="submit" id="create">Create Account</button>
     <br> 
  </div>
   <div class="divider">
    <span>Or register with </span>
  </div>
    <div class="lowerbuttons">
    <button type="submit" class="google">
        <img src="https://loremflickr.com/300/200" alt="">
        <a href="https://www.google.com/">Google</a>
    </button>
    <button type="submit" class="apple">
        
        <img src="https://loremflickr.com/300/200" alt="">
        <a href="#">Apple</a>
    </button>
    </div>
</form>
</div>

</div>
</body>
</html
