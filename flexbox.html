<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .container{
        display: flex;
        gap: 20px;
        background-color: lightblue;
        padding: 20px;
        justify-content: flex-end;
     }
     .containers{
        display: flex;
        gap: 20px;
        background-color: lightblue;
        padding: 20px;
        flex-direction: column-reverse;
        align-items: flex-end;
     }
     .item{
        padding: 10px;
     }
     .item1{background-color: rgb(7, 222, 251);}
     .item2{background-color: rgb(6, 212, 248);}
     .item3{background-color: rgb(5, 215, 248);}
     .item4{background-color: rgb(7, 206, 246);}
    </style>
</head>
<body>
    <h1>Flexbox</h1>
    <div class="container">
        <div class="item item1">item 1</div>
        <div class="item item2">item 2</div>
        <div class="item item3">item 3</div>
        <div class="item item4">item 4</div>
    </div>
    <br>
    <div class="containers">
        <div class="item item1">item 1</div>
        <div class="item item2">item 2</div>
        <div class="item item3">item 3</div>
        <div class="item item4">item 4</div>
    </div>
</body>
</html>
