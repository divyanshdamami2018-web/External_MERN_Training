<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .container{
        display: flex;
        gap: 20px;
        background-color: rgb(100, 101, 101);
        padding: 20px;
        justify-content: flex-end;
     }
     .containers{
        display: flex;
        gap: 20px;
        background-color: rgb(77, 78, 79);
        padding: 20px;
        flex-direction: column-reverse;
        align-items: flex-end;
     }
     .item{
        padding: 10px;
     }
     .item1{background-color: rgb(7, 222, 251);}
     .item2{background-color: rgb(6, 212, 248);}
     .item3{background-color: rgb(5, 215, 248);}
     .item4{background-color: rgb(7, 206, 246);}
     
     h1{
        text-align: center;
     }
    </style>
</head>
<body>
    <h1>Flexbox</h1>
    <div class="container">
        <div style="background-color: rgb(238, 241, 241); padding: 10px;">item 1</div>
        <div style="background-color:  rgb(238, 241, 241); padding: 10px;">item 2</div>
        <div style="background-color:  rgb(238, 241, 241); padding: 10px;">item 3</div>
        <div style="background-color:  rgb(238, 241, 241); padding: 10px;">item 4</div>
    </div>
    <br>
    <div class="containers" >
        <div style="background-color:rgb(220, 220, 220); rgb(220, 220, 220); padding: 10px;">item 1</div>
        <div style="background-color: rgb(220, 220, 220); rgb(140, 142, 142); padding: 10px;">item 2</div>
        <div style="background-color:rgb(220, 220, 220); rgb(140, 142, 142); padding: 10px;">item 3</div>
        <div style="background-color: rgb(220, 220, 220); rgb(140, 142, 142); padding: 10px;">item 4</div>
    </div>
</body>
</html>
